<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Earth Rotation Simulator</title>
  <style>
    :root {
      --bg: #030712;
      --panel: rgba(15, 23, 42, 0.75);
      --line: rgba(148, 163, 184, 0.35);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-2: #22d3ee;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Segoe UI, Roboto, system-ui, -apple-system, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% -10%, #0ea5e933 0%, transparent 45%),
        radial-gradient(circle at 90% 15%, #3b82f622 0%, transparent 40%),
        var(--bg);
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .wrap {
      width: min(96vw, 1100px);
      display: grid;
      gap: 1rem;
      grid-template-columns: 1fr;
    }

    .hud {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      backdrop-filter: blur(8px);
      padding: 0.8rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .title {
      display: grid;
      gap: 0.1rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(1rem, 2vw, 1.3rem);
      letter-spacing: 0.01em;
    }

    .subtitle {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.85rem;
      font-size: 0.85rem;
    }

    .control {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      color: var(--muted);
    }

    input[type="range"] {
      accent-color: var(--accent-2);
      width: 120px;
    }

    button {
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
      border: 0;
      border-radius: 999px;
      color: #06283a;
      font-weight: 700;
      padding: 0.45rem 0.85rem;
      cursor: pointer;
    }

    .viewport {
      position: relative;
      aspect-ratio: 16/10;
      width: 100%;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--line);
      box-shadow: 0 25px 65px #000a;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #01050e;
    }

    .info {
      position: absolute;
      right: 0.9rem;
      bottom: 0.7rem;
      font-size: 0.78rem;
      background: rgba(2, 6, 23, 0.65);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0.35rem 0.55rem;
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hud">
      <div class="title">
        <h1>🌍 Earth Rotation Simulator</h1>
        <div class="subtitle">Canvas-rendered globe with axial tilt, day/night terminator, and moving cloud layer.</div>
      </div>
      <div class="controls">
        <label class="control">Speed
          <input id="speed" type="range" min="0" max="3" step="0.01" value="1" />
        </label>
        <label class="control">Tilt
          <input id="tilt" type="range" min="0" max="35" step="0.1" value="23.5" />
        </label>
        <button id="toggle">Pause</button>
      </div>
    </div>

    <div class="viewport">
      <canvas id="scene"></canvas>
      <div class="info" id="readout">UTC 00:00 • Rotation 0°</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('scene');
    const ctx = canvas.getContext('2d');
    const speedEl = document.getElementById('speed');
    const tiltEl = document.getElementById('tilt');
    const toggleEl = document.getElementById('toggle');
    const readoutEl = document.getElementById('readout');

    let w = 0, h = 0, dpr = 1;
    let running = true;
    let rotation = 0;
    let cloudRotation = 0;
    let last = performance.now();

    const stars = [];
    for (let i = 0; i < 500; i++) {
      stars.push({
        x: Math.random(),
        y: Math.random(),
        r: Math.random() * 1.8 + 0.25,
        a: Math.random() * 0.9 + 0.1,
        tw: Math.random() * Math.PI * 2
      });
    }

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = canvas.clientWidth;
      h = canvas.clientHeight;
      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener('resize', resize);
    resize();

    function fract(v) { return v - Math.floor(v); }

    function landMask(lon, lat) {
      const n1 = Math.sin((lon + 0.7) * 2.1) * Math.cos((lat - 0.4) * 2.4);
      const n2 = Math.sin((lon * 4.8) - (lat * 2.2)) * 0.45;
      const n3 = Math.cos((lon * 9.4) + (lat * 6.1)) * 0.2;
      const ridges = Math.abs(Math.sin(lon * 3.4 + lat * 1.8)) * 0.15;
      return n1 + n2 + n3 - ridges;
    }

    function drawStars(t) {
      const sky = ctx.createRadialGradient(w * 0.52, h * 0.45, 40, w * 0.5, h * 0.5, Math.max(w, h));
      sky.addColorStop(0, '#051428');
      sky.addColorStop(0.45, '#020b18');
      sky.addColorStop(1, '#00040c');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, w, h);

      for (const s of stars) {
        const twinkle = 0.6 + 0.4 * Math.sin(t * 0.0018 + s.tw);
        ctx.globalAlpha = s.a * twinkle;
        ctx.fillStyle = '#dbeafe';
        ctx.beginPath();
        ctx.arc(s.x * w, s.y * h, s.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function drawEarth(t) {
      const cx = w * 0.5;
      const cy = h * 0.53;
      const radius = Math.min(w, h) * 0.29;

      const tilt = (Number(tiltEl.value) * Math.PI) / 180;
      const sunX = Math.cos(t * 0.00005);
      const sunY = Math.sin(t * 0.00005) * 0.25;

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(-tilt);

      const halo = ctx.createRadialGradient(0, 0, radius * 1.1, 0, 0, radius * 1.8);
      halo.addColorStop(0, '#38bdf81f');
      halo.addColorStop(1, 'transparent');
      ctx.fillStyle = halo;
      ctx.beginPath();
      ctx.arc(0, 0, radius * 1.8, 0, Math.PI * 2);
      ctx.fill();

      ctx.beginPath();
      ctx.arc(0, 0, radius, 0, Math.PI * 2);
      ctx.clip();

      for (let y = -radius; y <= radius; y += 1.2) {
        const ny = y / radius;
        const span = Math.sqrt(Math.max(0, 1 - ny * ny));
        const x0 = -span * radius;
        const x1 = span * radius;

        for (let x = x0; x <= x1; x += 1.2) {
          const nx = x / radius;
          const nz = Math.sqrt(Math.max(0, 1 - nx * nx - ny * ny));
          const lon = Math.atan2(nx, nz) + rotation;
          const lat = Math.asin(ny);

          const land = landMask(lon, lat);
          let r, g, b;
          if (land > 0.18) {
            const hill = 0.5 + 0.5 * Math.sin(lon * 11 + lat * 8);
            r = 45 + hill * 25;
            g = 110 + hill * 70;
            b = 52 + hill * 16;
          } else {
            const ocean = 0.55 + 0.45 * Math.sin(lon * 6.5 + lat * 4.2);
            r = 10 + ocean * 18;
            g = 70 + ocean * 42;
            b = 135 + ocean * 90;
          }

          const cloudLon = lon + cloudRotation;
          const cloudNoise = Math.sin(cloudLon * 9.5) * Math.cos(lat * 7.8) + Math.sin(cloudLon * 17.2 + lat * 11.1) * 0.5;
          const cloud = cloudNoise > 0.95 ? (cloudNoise - 0.95) * 18 : 0;

          const light = Math.max(0.06, nx * sunX + ny * sunY + nz * 0.95);
          const fresnel = Math.pow(1 - nz, 2.2);

          r = Math.min(255, r * light + cloud * 24 + fresnel * 70);
          g = Math.min(255, g * light + cloud * 24 + fresnel * 90);
          b = Math.min(255, b * light + cloud * 26 + fresnel * 140);

          ctx.fillStyle = `rgb(${r|0},${g|0},${b|0})`;
          ctx.fillRect(x, y, 1.5, 1.5);
        }
      }

      const atmosphere = ctx.createRadialGradient(0, 0, radius * 0.88, 0, 0, radius * 1.08);
      atmosphere.addColorStop(0, 'transparent');
      atmosphere.addColorStop(0.82, '#7dd3fc33');
      atmosphere.addColorStop(1, '#67e8f955');
      ctx.strokeStyle = '#7dd3fc77';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, radius, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = atmosphere;
      ctx.beginPath();
      ctx.arc(0, 0, radius * 1.08, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();

      const shadowGrad = ctx.createLinearGradient(cx + radius * 1.3, cy, cx - radius * 1.3, cy);
      shadowGrad.addColorStop(0, 'transparent');
      shadowGrad.addColorStop(1, '#000000a0');
      ctx.fillStyle = shadowGrad;
      ctx.beginPath();
      ctx.ellipse(cx + radius * 0.03, cy + radius * 1.12, radius * 0.75, radius * 0.17, 0, 0, Math.PI * 2);
      ctx.fill();

      const deg = ((rotation * 180 / Math.PI) % 360 + 360) % 360;
      const utcHour = Math.floor(fract(rotation / (Math.PI * 2)) * 24);
      const utcMin = Math.floor(fract(rotation / (Math.PI * 2)) * 24 * 60) % 60;
      readoutEl.textContent = `UTC ${String(utcHour).padStart(2, '0')}:${String(utcMin).padStart(2, '0')} • Rotation ${deg.toFixed(1)}°`;
    }

    function frame(now) {
      const dt = Math.min(0.05, (now - last) / 1000);
      last = now;
      if (running) {
        const speed = Number(speedEl.value);
        rotation += dt * speed * 0.9;
        cloudRotation += dt * speed * 1.15;
      }

      drawStars(now);
      drawEarth(now);
      requestAnimationFrame(frame);
    }

    toggleEl.addEventListener('click', () => {
      running = !running;
      toggleEl.textContent = running ? 'Pause' : 'Resume';
    });

    requestAnimationFrame(frame);
  </script>
</body>
</html>
